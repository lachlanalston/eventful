<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventful — Windows Event Intelligence</title>
  <meta name="description" content="Instant Windows Event ID lookup for MSP technicians. Search by symptom or event ID." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>

  <div class="page">

    <header class="site-header">
      <nav class="home-nav">
        <a href="results.html" class="home-nav-link">Event Lookup</a>
        <a href="analyzer.html" class="home-nav-link">Incident Analyzer</a>
      </nav>
      <button class="theme-btn" title="Toggle theme">☀</button>
    </header>

    <main class="hero">
      <div class="hero-inner">

        <p class="wordmark">Eventful</p>
        <h1>Search the symptom.<br>Find the Event ID.</h1>
        <p class="sub">A Windows event log research tool for MSP technicians.</p>

        <form class="search-form" action="results.html" method="get">
          <div class="search-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input
              name="q"
              type="search"
              class="search-input"
              placeholder="account locked out, blue screen, 4625…"
              autocomplete="off"
              spellcheck="false"
              autofocus
            />
            <button type="submit" class="search-btn">Search</button>
          </div>
          <input type="hidden" name="severity" id="severity-input" value="" />
        </form>

        <div class="severity-filters">
          <button class="sev-btn sev-Critical" data-severity="Critical">Critical</button>
          <button class="sev-btn sev-Error"    data-severity="Error">Error</button>
          <button class="sev-btn sev-Warning"  data-severity="Warning">Warning</button>
          <button class="sev-btn sev-Info"     data-severity="Info">Info</button>
          <button class="sev-btn sev-Verbose"  data-severity="Verbose">Verbose</button>
        </div>

        <div class="suggestions">
          <a href="results.html?q=account+locked+out" class="chip">account locked out</a>
          <a href="results.html?q=blue+screen" class="chip">blue screen</a>
          <a href="results.html?q=rdp+disconnecting" class="chip">RDP disconnecting</a>
          <a href="results.html?q=service+crashed" class="chip">service crashed</a>
          <a href="results.html?q=4625" class="chip">Event 4625</a>
          <a href="results.html?q=4740" class="chip">Event 4740</a>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      <span>69 events across Security · System · Application · RDS · Network · DNS</span>
    </footer>

  </div>

  <script type="module" src="assets/js/home.js"></script>
</body>
</html>
